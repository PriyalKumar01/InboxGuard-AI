<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InboxGuard AI – Intelligent Email Assistant</title>
  <meta name="description" content="InboxGuard AI – your intelligent multi-agent email assistant that prioritizes, summarizes, and protects your inbox." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar">
    <div class="sb-top">
      <div class="sb-logo">
        <div class="sb-logo-icon">🛡</div>
        <div>
          <div class="sb-logo-text">InboxGuard AI</div>
          <div class="sb-logo-sub">Smart Email Assistant</div>
        </div>
      </div>
      <button class="compose-btn" id="compose-btn">✏ Compose</button>
    </div>

    <nav class="sb-nav">
      <div class="nav-label">Mailbox</div>
      <div class="nav-item active" data-view="inbox">
        <span class="nav-icon">📥</span>
        <span>Inbox</span>
        <span class="nav-badge" id="inbox-badge"></span>
      </div>
      <div class="nav-item" data-view="starred">
        <span class="nav-icon">⭐</span>
        <span>Starred</span>
      </div>
      <div class="nav-item" data-view="trash">
        <span class="nav-icon">🗑</span>
        <span>Trash</span>
      </div>
    </nav>

    <!-- Daily Briefing -->
    <div class="briefing-wrap">
      <div class="briefing-head" id="briefing-head">
        <span>🧠 Daily Briefing</span>
        <span class="bh-chevron">▼</span>
      </div>
      <div class="briefing-body" id="briefing-body">
        <div class="b-stats">
          <div class="b-stat">
            <div class="b-stat-n" id="b-unread">–</div>
            <div class="b-stat-l">Unread</div>
          </div>
          <div class="b-stat">
            <div class="b-stat-n" id="b-high" style="color:var(--accent-red)">–</div>
            <div class="b-stat-l">High Priority</div>
          </div>
          <div class="b-stat">
            <div class="b-stat-n" id="b-mtgs" style="color:var(--accent-teal)">–</div>
            <div class="b-stat-l">Meetings</div>
          </div>
          <div class="b-stat">
            <div class="b-stat-n" id="b-total">–</div>
            <div class="b-stat-l">Total</div>
          </div>
        </div>
        <div class="b-bars">
          <div class="b-bar"><div class="b-bar-fill high" id="pb-high" style="width:0%"></div></div>
          <div class="b-bar"><div class="b-bar-fill med" id="pb-med" style="width:0%"></div></div>
          <div class="b-bar"><div class="b-bar-fill low" id="pb-low" style="width:0%"></div></div>
        </div>
        <div class="b-highlights" id="b-highlights"></div>
      </div>
    </div>
  </aside>

  <!-- ═══ EMAIL LIST PANE ═══ -->
  <section id="list-pane">
    <div class="list-head">
      <div class="list-head-row">
        <h2 id="list-h2">Inbox</h2>
        <span class="list-head-count" id="list-count"></span>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder='Search: "show interview emails", "unread meetings"…'
          autocomplete="off"
        />
      </div>
      <div class="filter-row">
        <button class="filt-btn active" data-pf="all">All</button>
        <button class="filt-btn" data-pf="high">🔴 High</button>
        <button class="filt-btn" data-pf="medium">🟡 Medium</button>
        <button class="filt-btn" data-pf="low">🟢 Low</button>
      </div>
    </div>
    <div class="email-list" id="email-list"></div>
  </section>

  <!-- ═══ EMAIL DETAIL PANE ═══ -->
  <section id="detail-pane">
    <div class="detail-placeholder">
      <div class="dp-icon">✉️</div>
      <div class="dp-title">Select an email to read</div>
      <div class="dp-sub">InboxGuard AI is monitoring your inbox.</div>
    </div>
  </section>

</div>

<!-- ═══ DELETE MODAL ═══ -->
<div id="modal-bg">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">⚠️</div>
    <div class="modal-title" id="modal-title">Delete Email?</div>
    <div class="modal-msg" id="modal-msg">Are you sure you want to delete this email?</div>
    <div class="modal-btns">
      <button class="mbtn keep" id="modal-cancel">Keep Email</button>
      <button class="mbtn del-confirm" id="modal-confirm">Delete Anyway</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toast"></div>

<!-- Scripts: data → agents → app (order matters!) -->
<script src="data.js"></script>
<script src="agents.js"></script>
<script src="app.js"></script>

</body>
</html>
